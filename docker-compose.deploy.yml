name: instock_prod

services:
  app:
    image: ${IMAGE_NAMESPACE:-instock}/instock-app:${APP_VERSION:-dev}
    container_name: instock_app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-instock}:${POSTGRES_PASSWORD:-instock_pass}@${POSTGRES_HOST:-instock_postgres}:5432/${POSTGRES_DB:-instock}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-instock}:${POSTGRES_PASSWORD:-instock_pass}@${POSTGRES_HOST:-instock_postgres}:5432/${POSTGRES_DB:-instock}
      - APP_PORT=8000
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      - PYTHONPATH=/app
      - APP_VERSION=${APP_VERSION:-dev}
      - APP_GIT_SHA=${APP_GIT_SHA:-local}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_HTTP_URL=${TUSHARE_HTTP_URL:-http://lianghua.nanyangqiankun.top}
      - CRAWLER_PROXY_ENABLED=${CRAWLER_PROXY_ENABLED:-false}
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    networks:
      - instock_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${IMAGE_NAMESPACE:-instock}/instock-frontend:${APP_VERSION:-dev}
    container_name: instock_frontend
    ports:
      - "3001:80"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - instock_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  instock_network:
    external: true
    name: instock_network

volumes:
  app_logs:
    external: true
    name: instock_fastapi_app_logs
