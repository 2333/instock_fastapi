name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key-at-least-32-characters
      DEBUG: "false"
      CRAWLER_PROXY_ENABLED: "false"
      COV_FAIL_UNDER: "30"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget
          wget https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Sync backend dependencies
        run: uv sync --frozen --dev

      - name: Ruff
        run: uv run ruff check app tests --select E9,F63,F7,F82

      - name: Incremental style gate
        run: make style-check

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=$COV_FAIL_UNDER

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      ENV_FILE: config/docker-ci.env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose services
        run: docker compose up -d --build postgres redis app frontend

      - name: Docker smoke test
        run: |
          chmod +x scripts/docker_smoke.sh
          ./scripts/docker_smoke.sh

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color app frontend postgres redis

      - name: Stop compose services
        if: always()
        run: docker compose down -v --remove-orphans
