name: instock_ci

services:
  postgres:
    image: timescale/timescaledb:2.13.1-pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-instock_pass}
      POSTGRES_USER: ${POSTGRES_USER:-instock}
      POSTGRES_DB: ${POSTGRES_DB:-instock}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-instock}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_NAMESPACE:-instock}/instock-app:ci
    build:
      context: .
      args:
        APP_VERSION: ci
        APP_GIT_SHA: ${GITHUB_SHA:-local-ci}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-instock}:${POSTGRES_PASSWORD:-instock_pass}@postgres:5432/${POSTGRES_DB:-instock}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-instock}:${POSTGRES_PASSWORD:-instock_pass}@postgres:5432/${POSTGRES_DB:-instock}
      APP_PORT: ${APP_PORT:-8000}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3001}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-*}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_HTTP_URL: ${TUSHARE_HTTP_URL:-http://lianghua.nanyangqiankun.top}
      CRAWLER_PROXY_ENABLED: ${CRAWLER_PROXY_ENABLED:-false}
      SCHEDULER_ENABLED: "false"
      DEBUG: "false"
      PYTHONPATH: /app
      APP_VERSION: ci
      APP_GIT_SHA: ${GITHUB_SHA:-local-ci}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${IMAGE_NAMESPACE:-instock}/instock-frontend:ci
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        APP_VERSION: ci
        APP_GIT_SHA: ${GITHUB_SHA:-local-ci}
    ports:
      - "3001:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
