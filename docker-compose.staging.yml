# 预发布环境 Docker Compose
# 使用独立预发布数据库，前后端用测试新代码
# 用法: docker compose -f docker-compose.staging.yml up --build -d

services:
  postgres:
    image: timescale/timescaledb:2.13.1-pg16
    container_name: instock_staging_postgres
    environment:
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:-instock_pass}
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-instock}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-instock}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "${STAGING_POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER:-instock}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - instock_staging_network

  app:
    image: ${IMAGE_NAMESPACE:-instock}/instock-app:staging
    build:
      context: .
      args:
        APP_VERSION: staging
        APP_GIT_SHA: local-staging
    container_name: instock_staging_app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${STAGING_POSTGRES_USER:-instock}:${STAGING_POSTGRES_PASSWORD:-instock_pass}@postgres:5432/${STAGING_POSTGRES_DB:-instock}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${STAGING_POSTGRES_USER:-instock}:${STAGING_POSTGRES_PASSWORD:-instock_pass}@postgres:5432/${STAGING_POSTGRES_DB:-instock}
      - APP_PORT=8000
      - UVICORN_WORKERS=${STAGING_UVICORN_WORKERS:-1}
      - PYTHONPATH=/app
      - APP_VERSION=staging
      - APP_GIT_SHA=local-staging
      - SECRET_KEY=${STAGING_SECRET_KEY:-staging-secret-key-change-before-shared-use-123456}
      - LOG_LEVEL=${STAGING_LOG_LEVEL:-INFO}
      - DEBUG=${STAGING_DEBUG:-false}
      - SCHEDULER_ENABLED=${STAGING_SCHEDULER_ENABLED:-false}
      - CRAWLER_PROXY_ENABLED=false
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TUSHARE_HTTP_URL=${TUSHARE_HTTP_URL:-https://api.tushare.pro}
      - FUND_FLOW_STOCK_SOURCE=eastmoney
      - FUND_FLOW_SECTOR_SOURCE=tushare
    ports:
      - "${STAGING_APP_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./core:/app/core
      - ./scripts:/app/scripts
      - ./config:/app/config
      - app_staging_logs:/app/logs
    restart: unless-stopped
    networks:
      - instock_staging_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${IMAGE_NAMESPACE:-instock}/instock-frontend:staging
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        APP_VERSION: staging
        APP_GIT_SHA: local-staging
    container_name: instock_staging_frontend
    environment:
      - VITE_API_URL=http://localhost:${STAGING_APP_PORT:-8002}
    ports:
      - "${STAGING_FRONTEND_PORT:-3003}:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - instock_staging_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  instock_staging_network:
    driver: bridge

volumes:
  postgres_staging_data:
  app_staging_logs:
