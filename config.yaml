# Database Configuration
database:
  host: "localhost"
  port: 3306
  user: "root"
  password: "replace-with-mysql-password"
  database: "instock"

postgresql:
  host: "localhost"
  port: 5432
  user: "instock"
  password: "replace-with-postgres-password"
  database: "instock"

# Tushare API Configuration
tushare:
  token: "replace-with-your-tushare-token"

# Redis Configuration (optional, for caching)
redis:
  host: "localhost"
  port: 6379
  db: 0

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
